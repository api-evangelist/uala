aid: uala
name: Ualá
description: >-
  Ualá is an Argentine financial technology company and neobank founded in
  2017 by Pierpaolo Barbieri, headquartered in Buenos Aires. The company
  delivers a mobile-first financial ecosystem anchored by a Mastercard
  prepaid/debit card linked to an in-app account, with a layered product
  suite that includes credit cards, personal loans, savings accounts with
  yield, fixed-term deposits, mutual funds (FCIs), stocks, bonds, CEDEARs,
  insurance, bill payments, recharges, and international transfers. Its
  merchant arm, Ualá Bis, provides payment links, online checkout, and POS
  hardware (POS Mini and POS Pro) for SMBs and online stores, exposing a
  public Cobros Online v2 API plus SDKs and pre-built integrations for
  WooCommerce, Tienda Nube, Magento, and Empretienda. Ualá operates as a
  regulated bank in Argentina (under BCRA oversight), has acquired ABC
  Capital in Mexico to operate as a chartered Mexican bank, and is the
  first technology-based company licensed as a financing entity by
  Colombia's Financial Superintendence. The company reached a $3.2B
  valuation following $195M in new equity in 2024, and reports more than
  eight million users across Argentina, Mexico, and Colombia. UaláScore,
  the company's AI-driven credit evaluation system, powers personalized
  lending across markets. Public developer surface is limited to the
  Ualá Bis merchant payments API; the consumer banking, lending, and
  investing capabilities are not exposed as third-party developer APIs.
